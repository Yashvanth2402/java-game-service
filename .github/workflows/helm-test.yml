name: Helm Test
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    branches:
    - dev
    - release/*
    paths:
    - helm/**
  pull_request:
    branches:
    - dev
    - release/*
    paths:
    - helm/**
  workflow_dispatch:
jobs:
  helm-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup Helm
      uses: azure/setup-helm@v4.2.0
      with:
        version: v3.14.0
    - name: Helm Lint
      run: helm lint ./helm
    - name: Helm Template Staging
      run: helm template java-game-service ./helm -f ./helm/values.yaml -f ./helm/values-stage.yaml --debug
    - name: Helm Template Production
      run: helm template java-game-service ./helm -f ./helm/values.yaml -f ./helm/values-prod.yaml --debug
    - name: Helm Dry Run
      run: helm install java-game-service ./helm --dry-run --debug
  notify-on-failure:
    runs-on: ubuntu-latest
    needs:
    - helm-test
    if: failure()
    steps:
    - name: Send Slack notification
      uses: slackapi/slack-github-action@v1.24.0
      with:
        payload: |
          {"text": "Pipeline failed: ${{ github.repository }} - ${{ github.workflow }}"}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
