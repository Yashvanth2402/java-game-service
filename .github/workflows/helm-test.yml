name: Helm Test
'on':
  push:
    branches:
    - dev
    - release/*
    paths:
    - helm/**
  pull_request:
    branches:
    - dev
    - release/*
    paths:
    - helm/**
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup Helm
      uses: azure/setup-helm@v4.2.0
      with:
        version: v3.14.0
    - name: Helm Lint
      run: helm lint ./helm
    - name: Helm Template
      run: helm template java-game-service ./helm
    - name: Helm Dry Run
      run: helm install java-game-service ./helm --dry-run --debug
  notify-on-failure:
    runs-on: ubuntu-latest
    if: failure()
    needs: lint-and-test
    steps:
    - name: Send Slack Notification
      uses: slackapi/slack-github-action@v1.24.0
      with:
        payload: '{"text": "Helm Test Pipeline failed for ${{ github.repository }} on branch ${{ github.ref }}. See details:
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}

          '
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
