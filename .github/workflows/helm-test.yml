name: Helm Tests

on:
  push:
    branches: [dev, "release/*"]
    # feature/* intentionally excluded from push trigger
    # feature/* branches get CI via pull_request trigger when PR opened to dev
  pull_request:
    branches: [dev, "release/*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  helm-lint-and-template:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Helm Lint
        run: helm lint ./helm

      - name: Helm Template
        run: helm template ./helm

  notify-on-failure:
    if: failure()
    needs: [helm-lint-and-template]
    runs-on: ubuntu-latest
    steps:
      - uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {"text": "Pipeline failed: ${{ github.repository }}"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}