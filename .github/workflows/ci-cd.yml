"content": "name: Java Spring Boot CI/CD\n\non:\n  push:\n    branches:\n      - main\n  pull_request:\n    branches:\n      - main\n\nenv:\n  REPO_NAME: java-game-service\n  GCP_PROJECT_ID: project-166a7983-818b-43fa-932\n  GCP_REGION: us-central1\n  ARTIFACT_REGISTRY_URL: us-central1-docker.pkg.dev/project-166a7983-818b-43fa-932/cicd-agent-repo\n  IMAGE_NAME: ${{ env.ARTIFACT_REGISTRY_URL }}/${{ env.REPO_NAME }}\n\njobs:\n  build-and-test:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Checkout code\n        uses: actions/checkout@v4\n        with:\n          fetch-depth: 0 # Required for SonarQube blame data\n\n      - name: Gitleaks Scan\n        uses: gitleaks/gitleaks-action@v2\n        env:\n          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}\n        continue-on-error: false # Fail pipeline immediately on secret detection\n\n      - name: Get Java Version from pom.xml\n        id: get_java_version\n        run: |\n          JAVA_VERSION=$(grep -oP '(?<=<java.version>).*(?=</java.version>)' pom.xml || echo '17')\n          echo \"JAVA_VERSION=$JAVA_VERSION\" >> \"$GITHUB_ENV\"\n\n      - name: Setup Java ${{ env.JAVA_VERSION }}\n        uses: actions/setup-java@v4\n        with:\n          java-version: ${{ env.JAVA_VERSION }}\n          distribution: temurin\n\n      - name: Cache Maven dependencies\n        uses: actions/cache@v4\n        with:\n          path: ~/.m2\n          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}\n          restore-keys: ${{ runner.os }}-maven-\n\n      - name: Run Unit Tests\n        run: mvn test\n\n      - name: SonarQube Scan\n        run: mvn sonar:sonar -Dsonar.projectKey=${{ github.event.repository.name }} -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${{ secrets.SONAR_TOKEN }} -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION || 'your-sonarcloud-org' }} # SONAR_ORGANIZATION should be set as a secret\n        env:\n          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}\n\n      - name: Hadolint Dockerfile Scan\n        uses: hadolint/hadolint-action@v3.1.0\n        with:\n          dockerfile: Dockerfile\n          failure-threshold: error\n\n      - name: Trivy Dependency Scan\n        uses: aquasecurity/trivy-action@master\n        with:\n          scan-type: fs\n          scan-ref: .\n          severity: CRITICAL,HIGH\n          exit-code: 1\n          format: sarif\n          output: trivy-results.sarif\n\n      - name: Build JAR\n        run: mvn package -DskipTests\n\n  docker-build-push:\n    needs: build-and-test\n    runs-on: ubuntu-latest\n    steps:\n      - name: Checkout code\n        uses: actions/checkout@v4\n\n      - name: Authenticate to GCP\n        uses: google-github-actions/auth@v2\n        with:\n          credentials_json: ${{ secrets.GCP_SA_KEY }}\n\n      - name: Set up GCloud SDK\n        uses: google-github-actions/setup-gcloud@v2\n        with:\n          project_id: ${{ env.GCP_PROJECT_ID }}\n\n      - name: Configure Docker to use Artifact Registry\n        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev\n\n      - name: Build Docker image\n        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .\n\n      - name: Trivy Image Scan\n        uses: aquasecurity/trivy-action@master\n        with:\n          scan-type: image\n          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}\n          severity: CRITICAL,HIGH\n          exit-code: 1\n          format: sarif\n          output: trivy-image-results.sarif\n\n      - name: Push Docker image to Artifact Registry\n        run: docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}\n\n  deploy-staging:\n    needs: docker-build-push\n    runs-on: ubuntu-latest\n    steps:\n      - name: Checkout code\n        uses: actions/checkout@v4\n\n      - name: Configure Git\n        run: |\n          git config user.name \"github-actions[bot]\"\n          git config user.email \"github-actions[bot]@users.noreply.github.com\"\n\n      - name: Install yq\n        run: sudo snap install yq\n\n      - name: Update Helm staging values.yaml\n        run: |\n          yq e '.image.tag = \"${{ github.sha }}\"' -i helm/values-staging.yaml\n          echo \"Updated helm/values-staging.yaml:\"\n          cat helm/values-staging.yaml\n\n      - name: Commit and Push Staging Changes\n        run: |\n          git add helm/values-staging.yaml\n          git commit -m \"chore(helm): Update staging image tag to ${{ github.sha }} [skip ci]\" || echo \"No changes to commit for staging\"\n          git push\n\n  manual-approval-prod:\n    needs: deploy-staging\n    runs-on: ubuntu-latest\n    environment:\n      name: production\n      url: https://your-app-prod-url.com # Placeholder for your production URL\n    steps:\n      - name: Manual approval for Production deployment\n        run: echo \"Waiting for manual approval to deploy to production...\"\n\n  deploy-prod:\n    needs: manual-approval-prod\n    runs-on: ubuntu-latest\n    steps:\n      - name: Checkout code\n        uses: actions/checkout@v4\n\n      - name: Configure Git\n        run: |\n          git config user.name \"github-actions[bot]\"\n          git config user.email \"github-actions[bot]@users.noreply.github.com\"\n\n      - name: Install yq\n        run: sudo snap install yq\n\n      - name: Update Helm production values.yaml\n        run: |\n          yq e '.image.tag = \"${{ github.sha }}\"' -i helm/values-prod.yaml\n          echo \"Updated helm/values-prod.yaml:\"\n          cat helm/values-prod.yaml\n\n      - name: Commit and Push Production Changes\n        run: |\n          git add helm/values-prod.yaml\n          git commit -m \"chore(helm): Update production image tag to ${{ github.sha }} [skip ci]\" || echo \"No changes to commit for production\"\n          git push\n\n  # --- Notification and Jira Steps (run on failure) ---\n  notify-on-failure:\n    if: failure()\n    needs: [build-and-test, docker-build-push, deploy-staging, manual-approval-prod, deploy-prod]\n    runs-on: ubuntu-latest\n    steps:\n      - name: Get workflow run URL\n        id: get_run_url\n        run: echo \"run_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\" >> $GITHUB_OUTPUT\n\n      - name: Send Slack Notification (Pipeline Failed)\n        uses: slackapi/slack-github-action@v1.24.0\n        with:\n          payload:\n            text: ':x: Pipeline Failed: ${{ github.workflow }} for ${{ github.repository }} branch ${{ github.ref_name }}'\n            blocks: |\n              [\n                {\n                  \"type\": \"section\",\n                  \"text\": {\n                    \"type\": \"mrkdwn\",\n                    \"text\": \":x: *Pipeline Failed:* <${{ steps.get_run_url.outputs.run_url }}|${{ github.workflow }}> for `${{ github.repository }}` branch `${{ github.ref_name }}`\n                  }\n                },\n                {\n                  \"type\": \"context\",\n                  \"elements\": [\n                    {\n                      \"type\": \"mrkdwn\",\n                      \"text\": \"Commit: `${{ github.sha }}` by `${{ github.actor }}`\"\n                    }\n                  ]\n                }\n              ]\n        env:\n          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}\n          SLACK_CHANNEL: '#cicd-alerts'\n\n      - name: Create Jira Ticket (SonarQube Quality Gate Failed)\n        if: contains(github.event.pull_request.body, 'SonarQube Quality Gate failed') || contains(github.event.head_commit.message, 'SonarQube Quality Gate failed') # Heuristic, actual check would be in SonarQube step\n        uses: atlassian/jira-create-issue@v3\n        with:\n          jira-token: ${{ secrets.JIRA_TOKEN }}\n          jira-base-url: ${{ secrets.JIRA_URL }}\n          project-key: ${{ secrets.JIRA_PROJECT_KEY }}\n          issue-type: Bug\n          summary: 'SonarQube Quality Gate Failed for ${{ github.repository }}'\n          description: 'The SonarQube Quality Gate failed for repository ${{ github.repository }} on commit ${{ github.sha }}. Please review the SonarCloud report: ${{ steps.get_run_url.outputs.run_url }}'\n          assignee: ${{ github.actor }} # Assign to developer\n\n      - name: Create Jira Ticket (Gitleaks Secret Found)\n        if: contains(github.event.pull_request.body, 'Gitleaks detected secrets') || contains(github.event.head_commit.message, 'Gitleaks detected secrets') # Heuristic, actual check would be in Gitleaks step\n        uses: atlassian/jira-create-issue@v3\n        with:\n          jira-token: ${{ secrets.JIRA_TOKEN }}\n          jira-base-url: ${{ secrets.JIRA_URL }}\n          project-key: ${{ secrets.JIRA_PROJECT_KEY }}\n          issue-type: Security\n          summary: 'Gitleaks detected secrets in ${{ github.repository }}'\n          description: 'Gitleaks detected secrets in repository ${{ github.repository }} on commit ${{ github.sha }}. Please review the pipeline run: ${{ steps.get_run_url.outputs.run_url }} and rotate the secret immediately.'\n          assignee: Security Team # Assign to Security Team\n\n      - name: Create Jira Ticket (Trivy CRITICAL CVE Found)\n        if: contains(github.event.pull_request.body, 'Trivy detected CRITICAL CVEs') || contains(github.event.head_commit.message, 'Trivy detected CRITICAL CVEs') # Heuristic, actual check would be in Trivy step\n        uses: atlassian/jira-create-issue@v3\n        with:\n          jira-token: ${{ secrets.JIRA_TOKEN }}\n          jira-base-url: ${{ secrets.JIRA_URL }}\n          project-key: ${{ secrets.JIRA_PROJECT_KEY }}\n          issue-type: Security\n          summary: 'Trivy detected CRITICAL CVEs in ${{ github.repository }}'\n          description: 'Trivy detected CRITICAL CVEs in repository ${{ github.repository }} on commit ${{ github.sha }}. Please review the pipeline run: ${{ steps.get_run_url.outputs.run_url }}'\n          assignee: Security Team # Assign to Security Team\n"
    },
    {
      "file_path": ".github/workflows/helm-test.yml",
      "content": "name: Helm Chart Testing\n\non:\n  push:\n    branches:\n      - main\n    paths:\n      - 'helm/**'\n  pull_request:\n    branches:\n      - main\n    paths:\n      - 'helm/**'\n\nenv:\n  REPO_NAME: java-game-service\n\njobs:\n  helm-test:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Checkout code\n        uses: actions/checkout@v4\n\n      - name: Set up Helm\n        uses: azure/setup-helm@v3\n        with:\n          version: 'v3.10.0' # Specify a Helm version\n\n      - name: Helm Lint\n        run: helm lint helm/\n\n      - name: Helm Template Staging\n        run: helm template helm/ -f helm/values-staging.yaml\n\n      - name: Helm Template Production\n        run: helm template helm/ -f helm/values-prod.yaml\n\n      - name: Helm Dry Run Install (Staging)\n        run: helm install --dry-run --debug ${{ env.REPO_NAME }} helm/ -f helm/values-staging.yaml\n"
    }
  ]
}