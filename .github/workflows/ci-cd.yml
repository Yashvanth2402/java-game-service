name: Java Spring Boot CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

env:
  GCP_PROJECT_ID: project-166a7983-818b-43fa-932
  GCP_REGION: us-central1
  ARTIFACT_REGISTRY_URL: us-central1-docker.pkg.dev/project-166a7983-818b-43fa-932/cicd-agent-repo
  IMAGE_NAME: us-central1-docker.pkg.dev/project-166a7983-818b-43fa-932/cicd-agent-repo/java-game-service
  SONAR_ORGANIZATION: my-sonarcloud-org # Placeholder, replace with actual organization

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven and Run Unit Tests
        run: mvn -B clean install

      - name: Run Trivy Dependency Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          format: sarif
          output: trivy-results.sarif

      - name: Run SonarQube Scan
        run: mvn sonar:sonar -Dsonar.projectKey=java-game-service -Dsonar.organization=${{ env.SONAR_ORGANIZATION }} -Dsonar.host.url=https://sonarcloud.io
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Check SonarQube Quality Gate
        uses: SonarSource/sonarcloud-quality-gate-action@master
        with:
          projectKey: java-game-service
          organization: ${{ env.SONAR_ORGANIZATION }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1
          format: sarif
          output: trivy-image-results.sarif

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Push Docker image to Artifact Registry
        run: docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Update Helm values-staging.yaml with new image tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sed -i "s|repository:.*|repository: ${{ env.IMAGE_NAME }}|" helm/values-staging.yaml
          sed -i "s|tag:.*|tag: ${{ github.sha }}|" helm/values-staging.yaml
          git add helm/values-staging.yaml
          git commit -m "CI: Update image tag in helm/values-staging.yaml to ${{ github.sha }}"
          git push

      - name: Send Slack Notification on Failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: '#cicd-alerts'
          SLACK_MESSAGE: 'CI/CD pipeline failed for java-game-service. Check GitHub Actions for details.'
          SLACK_COLOR: 'danger'
          SLACK_USERNAME: 'GitHub Actions'
          SLACK_ICON_EMOJI: ':x:'
