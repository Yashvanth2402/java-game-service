name: CI

on:
  push:
    branches: [dev, release]
  pull_request:
    branches: [dev, release]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Gitleaks scan
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3. Setup runtime + cache
      - name: Set up Java 17 and Maven cache
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 4. Install dependencies
      - name: Install Maven dependencies
        run: mvn install -DskipTests

      # 5. Unit tests with coverage
      - name: Run Unit Tests
        run: mvn test

      # 6. Integration tests (ONLY if has_integration_tests=True)
      # Integration tests: skipped (no integration test files detected)

      # 7. SonarQube
      - name: SonarQube Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn sonar:sonar -Dsonar.projectKey=${{ github.event.repository.name }} -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} -Dsonar.host.url=https://sonarcloud.io

      # 8. Hadolint (NO if: always())
      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

      # 9. Trivy filesystem scan
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output: 'trivy-results.sarif'
          ignore-unfixed: true
          limit-severities-for-sarif: true
      - name: Upload Trivy FS scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      # 10. GCP auth + Docker configure
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Configure Docker to use GCP Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      # 11. Docker build
      - name: Build Docker image
        run: docker build -t us-central1-docker.pkg.dev/project-166a7983-818b-43fa-932/cicd-agent-repo/java-game-service:${{ github.sha }} .

      # 12. Trivy image scan
      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: us-central1-docker.pkg.dev/project-166a7983-818b-43fa-932/cicd-agent-repo/java-game-service:${{ github.sha }}
          scan-type: 'image'
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          ignore-unfixed: true
          limit-severities-for-sarif: true
      - name: Upload Trivy Image scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-image-results.sarif'

      # 13. Docker push
      - name: Push Docker image to Artifact Registry
        run: docker push us-central1-docker.pkg.dev/project-166a7983-818b-43fa-932/cicd-agent-repo/java-game-service:${{ github.sha }}

  notify-on-failure:
    if: failure()
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {"text": "Pipeline failed: ${{ github.repository }}"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}