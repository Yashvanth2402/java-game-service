name: CI
'on':
  push:
    branches:
    - dev
    - release/*
  pull_request:
    branches:
    - dev
    - release/*
  workflow_dispatch:
permissions:
  contents: write
  packages: write
  id-token: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'
        cache: maven
    - name: Install dependencies
      run: mvn clean install -DskipTests
    - name: Run Unit Tests
      run: mvn test
    - name: SonarQube scan
      run: "mvn sonar:sonar \\\n  -Dsonar.projectKey=${{ github.event.repository.name }} \\\n  -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION\
        \ }} \\\n  -Dsonar.host.url=https://sonarcloud.io\n"
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    - name: Hadolint
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: Dockerfile
        failure-threshold: error
    - name: Trivy filesystem scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        format: table
        exit-code: '1'
        scan-ref: .
    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}
    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2
    - name: Configure Docker
      run: gcloud auth configure-docker us-central1-docker.pkg.dev
    - name: Docker build
      run: docker build -t us-central1-docker.pkg.dev/project-166a7983-818b-43fa-932/cicd-agent-repo/java-game-service:${{
        github.sha }} .
    - name: Trivy image scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: image
        image-ref: us-central1-docker.pkg.dev/project-166a7983-818b-43fa-932/cicd-agent-repo/java-game-service:${{ github.sha
          }}
        format: table
        exit-code: '1'
    - name: Push Docker image
      run: docker push us-central1-docker.pkg.dev/project-166a7983-818b-43fa-932/cicd-agent-repo/java-game-service:${{ github.sha
        }}
  notify-on-failure:
    runs-on: ubuntu-latest
    if: failure()
    needs: build-and-scan
    steps:
